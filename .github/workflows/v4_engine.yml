name: V4 Quant Engine - Daily Compute

on:
  schedule:
    # 物理授时：配置多时段自动触发（已转换为 UTC 时间）
    - cron: '0 2,14,22 * * *'  # 触发北京时间：10:00, 22:00, 次日06:00
    - cron: '30 5,16 * * *'    # 触发北京时间：13:30, 次日00:30
    - cron: '50 8 * * *'       # 触发北京时间：16:50
  workflow_dispatch:

jobs:
  run-quant-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 配置 Python 3.11 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装量化模块
        run: pip install -r requirements.txt

      - name: 执行 M 模块矩阵测算与数据穿透
        run: python generate_macro.py
