name: INTOO V4 Daily Radar Auto-Scan

on:
  schedule:
    # 建议设置在每天清晨 (如 HKT 早6点 / UTC 晚22点)，此时美股已收盘，能生成最完整的日度切片
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas ta requests

      - name: Run V4 Macro Tracker
        run: generate_macro.py # 替换为你的 Python 文件名

      # ======================================================
      # 👈 核心新增：将生成的 CSV 自动提交回当前 GitHub 仓库
      # ======================================================
      - name: Commit and Push Historical Data
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "V4 Auto-Sync: Update daily macro history 🤖"
          file_pattern: "v4_macro_history_cloud.csv" # 只提交这个文件，防止污染
