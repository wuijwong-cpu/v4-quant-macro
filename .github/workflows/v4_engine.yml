name: V4 Quant Engine - Daily Compute (KV Edition)

on:
  schedule:
    # 每天 UTC 时间 22:00 运行 (北京时间早上 6:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许你在网页上手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出 V4 引擎代码
        uses: actions/checkout@v3
        
      - name: 2. 初始化 Python 3.11 火控环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 3. 加载量化依赖库
        run: pip install -r requirements.txt
        
      - name: 4. 运行引擎并写入 Cloudflare KV 数据库
        env:
          # 将 GitHub Secrets 提取并注入为环境变量，供 Python 读取
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python generate_macro.py
