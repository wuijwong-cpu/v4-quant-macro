name: V4 Quant Engine - Daily Compute

on:
  schedule:
    # 物理授时：每日 UTC 22:00 (北京时间 06:00) 自动触发
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-quant-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 配置 Python 3.11 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装量化模块
        run: pip install -r requirements.txt

      - name: 执行 M 模块矩阵测算与数据穿透
        run: python generate_macro.py
